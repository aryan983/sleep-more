<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">

<title>Wake Up</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #1a1a1a; --border: #333;
    --text: #e8e4dc; --muted: #555; --accent: #c8f060;
    --warn: #f0a040; --danger: #f06060; --good: #60d4a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    padding: 14px 14px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .header { display: flex; align-items: flex-start; justify-content: space-between; }
  .header h1 { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 300; line-height: 1.3; }
  .header h1 span { color: var(--accent); font-style: italic; }
  .header-right { text-align: right; }
  #clock { font-family: 'Fraunces', serif; font-size: 2.6rem; font-weight: 300; color: var(--text); line-height: 1; letter-spacing: -0.03em; }
  .header-sub { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.06em; margin-top: 3px; }

/* Weather strip */
.weather-strip { display: flex; align-items: center; justify-content: space-between; background: var(–surface); border: 1px solid var(–border); border-radius: 2px; padding: 6px 10px; gap: 8px; min-height: 32px; }
.weather-left { display: flex; align-items: center; gap: 7px; }
.weather-icon { font-size: 1.1rem; }
.weather-temp { font-size: 0.82rem; font-weight: 500; }
.weather-desc { font-size: 0.58rem; color: var(–muted); text-transform: lowercase; }
.weather-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.weather-tag { font-size: 0.52rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; white-space: nowrap; }
.weather-tag.rain { color: #6cb4ee; background: rgba(108,180,238,0.12); }
.weather-tag.cold { color: #8ec8f0; background: rgba(142,200,240,0.1); }
.weather-tag.wind { color: var(–muted); background: rgba(255,255,255,0.04); }
.weather-tag.clear { color: var(–good); background: rgba(96,212,160,0.08); }
.weather-prep { font-size: 0.54rem; color: var(–warn); white-space: nowrap; }
.weather-loading { font-size: 0.58rem; color: var(–muted); }

/* Line status banner */
.line-banner { border-radius: 2px; padding: 7px 10px; font-size: 0.62rem; line-height: 1.4; cursor: pointer; user-select: none; }
.line-banner.lb-good { border: 1px solid rgba(96,212,160,0.2); background: rgba(96,212,160,0.03); color: var(–good); }
.line-banner.lb-warn { border: 1px solid rgba(240,160,64,0.35); background: rgba(240,160,64,0.05); color: var(–warn); }
.line-banner.lb-bad  { border: 1px solid rgba(240,96,96,0.35); background: rgba(240,96,96,0.05); color: var(–danger); }
.line-banner.lb-info { border: 1px solid var(–border); background: var(–surface); color: var(–muted); }
.lb-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.lb-header-left { display: flex; align-items: center; gap: 8px; }
.lb-icon { font-size: 0.9rem; flex-shrink: 0; }
.lb-title { font-weight: 500; font-size: 0.62rem; }
.lb-chevron { font-size: 0.7rem; transition: transform 0.2s; color: inherit; opacity: 0.6; }
.lb-chevron.open { transform: rotate(180deg); }
.lb-detail { font-size: 0.56rem; color: var(–muted); margin-top: 6px; line-height: 1.5; overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 0; opacity: 0; }
.lb-detail.expanded { max-height: 300px; opacity: 1; }
.line-banner.lb-warn .lb-detail, .line-banner.lb-bad .lb-detail { color: inherit; opacity: 0.75; }
.line-banner.lb-warn .lb-detail.expanded, .line-banner.lb-bad .lb-detail.expanded { opacity: 0.75; }

/* Config */
.config-row { display: flex; gap: 6px; }
.config-block { background: var(–surface); border: 1px solid var(–border); border-radius: 2px; padding: 7px 10px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
.cfg-label { font-size: 0.54rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(–muted); }
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.toggle-name { font-size: 0.7rem; }
.toggle-mins { font-size: 0.58rem; color: var(–muted); }
.switch { position: relative; width: 32px; height: 17px; cursor: pointer; flex-shrink: 0; }
.switch input { display: none; }
.slider { position: absolute; inset: 0; background: #222; border-radius: 2px; transition: 0.15s; }
.slider:before { content: ‘’; position: absolute; width: 11px; height: 11px; left: 3px; top: 3px; background: var(–muted); border-radius: 1px; transition: 0.15s; }
input:checked + .slider { background: rgba(200,240,96,0.12); }
input:checked + .slider:before { transform: translateX(15px); background: var(–accent); }
.num-row { display: flex; align-items: center; justify-content: space-between; }
.num-name { font-size: 0.7rem; }
.num-ctrl { display: flex; align-items: center; gap: 4px; }
.num-input { background: #1a1a1a; border: 1px solid var(–border); color: var(–text); font-family: ‘DM Mono’, monospace; font-size: 0.72rem; padding: 2px 0; border-radius: 2px; width: 36px; text-align: center; outline: none; }
.num-input:focus { border-color: var(–accent); }
.num-unit { font-size: 0.58rem; color: var(–muted); }

.refresh-row { display: flex; justify-content: space-between; align-items: center; }
.section-label { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(–muted); }
.refresh-right { display: flex; align-items: center; gap: 6px; }
.refresh-btn { font-family: ‘DM Mono’, monospace; font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; background: none; border: 1px solid var(–border); color: var(–muted); padding: 5px 9px; border-radius: 2px; cursor: pointer; transition: all 0.15s; }
.refresh-btn:hover, .refresh-btn.loading { border-color: var(–accent); color: var(–accent); }
.sched-toggle { font-family: ‘DM Mono’, monospace; font-size: 0.54rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: 1px solid var(–border); color: var(–muted); padding: 5px 8px; border-radius: 2px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.sched-toggle:hover { border-color: #444; color: var(–text); }
.sched-toggle.active { border-color: rgba(200,240,96,0.3); color: var(–accent); background: rgba(200,240,96,0.04); }
.dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(–accent); margin-right: 5px; animation: pulse 2s ease-in-out infinite; vertical-align: middle; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.bus-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.bus-item { background: var(–surface); border: 1px solid var(–border); border-radius: 2px; padding: 10px 6px 9px; cursor: pointer; transition: border-color 0.15s, opacity 0.2s; text-align: center; }
.bus-item:hover { border-color: #444; }
.bus-item.selected { border-color: var(–accent); background: rgba(200,240,96,0.04); }
.bus-item.is-uncatchable { opacity: 0.35; }
.bus-item.is-sched-card { opacity: 0.45; border-style: dashed; }
.bus-item.is-sched-card:hover { opacity: 0.7; }
.bus-item.is-sched-card.selected { opacity: 0.8; }
.bus-time { font-size: 1.15rem; font-weight: 500; letter-spacing: -0.02em; }
.bus-sub { font-size: 0.58rem; color: var(–muted); margin-top: 2px; }
.bus-train { font-size: 0.62rem; color: var(–accent); margin-top: 4px; opacity: 0.9; letter-spacing: 0.01em; }
.badge { font-size: 0.52rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 2px 5px; border-radius: 2px; display: inline-block; margin-top: 5px; }
.badge-good  { color: var(–good);   background: rgba(96,212,160,0.1); }
.badge-tight { color: var(–warn);   background: rgba(240,160,64,0.1); }
.badge-miss  { color: var(–danger); background: rgba(240,96,96,0.1); }
.loading-msg { text-align: center; padding: 14px; color: var(–muted); font-size: 0.7rem; }
.spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid var(–border); border-top-color: var(–accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 5px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.sched-divider { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.sched-divider-line { flex: 1; height: 1px; background: var(–border); }
.sched-divider-label { font-size: 0.52rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(–muted); white-space: nowrap; }

.bus-status { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 4px; font-size: 0.57rem; letter-spacing: 0.07em; text-transform: uppercase; }
.bus-status.is-full    { color: var(–good); }
.bus-status.is-partial { color: var(–warn); }
.bus-status.is-sched   { color: var(–muted); }
.live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.is-full    .live-dot { background: var(–good); animation: liveblink 1.4s ease-in-out infinite; }
.is-partial .live-dot { background: var(–warn); animation: liveblink 2s ease-in-out infinite; }
.is-sched   .live-dot { background: var(–muted); }
@keyframes liveblink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.25;transform:scale(0.7)} }

.bus-delay { font-size: 0.55rem; margin-top: 2px; line-height: 1.3; }
.bus-delay .sched-time { color: var(–muted); text-decoration: line-through; }
.bus-delay .delay-amount { color: var(–warn); font-weight: 500; }
.bus-delay .early-amount { color: var(–good); font-weight: 500; }
.bus-history { font-size: 0.5rem; color: var(–muted); margin-top: 3px; font-style: italic; }

.result-panel { background: var(–surface); border: 1px solid var(–border); border-radius: 2px; padding: 12px 14px; }
.result-panel.active { border-color: var(–accent); }
.result-empty { font-size: 0.65rem; color: var(–muted); text-align: center; padding: 6px 0; }
.result-hero { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 12px; }
.result-lbl { font-size: 0.52rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(–muted); margin-bottom: 2px; }
.result-big { font-family: ‘Fraunces’, serif; font-size: 2.8rem; font-weight: 700; color: var(–accent); line-height: 1; }
.verdict { font-size: 0.9rem; font-weight: 500; text-align: right; padding-bottom: 4px; line-height: 1.3; }
.verdict.slack-good  { color: var(–good); }
.verdict.slack-tight { color: var(–warn); }
.verdict.slack-miss  { color: var(–danger); }
.steps { border-top: 1px solid var(–border); padding-top: 8px; display: flex; flex-direction: column; }
.step { display: flex; align-items: baseline; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #1c1c1c; gap: 10px; }
.step:last-child { border-bottom: none; }
.step-label { font-size: 0.68rem; color: var(–muted); flex-shrink: 0; }
.step-label em { color: var(–text); font-style: normal; }
.step-val { font-size: 0.88rem; color: var(–text); font-variant-numeric: tabular-nums; text-align: right; min-width: 0; }
.step-val.hi  { color: var(–accent); font-size: 1rem; font-weight: 500; }
.step-val.dim { color: var(–muted); font-size: 0.72rem; }
.step-divider { height: 1px; background: var(–border); margin: 3px 0; }
.suggestion { margin-top: 10px; border: 1px solid rgba(240,160,64,0.35); border-radius: 2px; padding: 8px 11px; background: rgba(240,160,64,0.05); display: flex; align-items: flex-start; gap: 8px; }
.suggestion-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.suggestion-body { flex: 1; }
.suggestion-title { font-size: 0.72rem; color: var(–warn); font-weight: 500; }
.suggestion-detail { font-size: 0.64rem; color: var(–muted); margin-top: 3px; line-height: 1.5; }
.suggestion-detail strong { color: var(–text); }
.suggestion.is-ok { border-color: rgba(96,212,160,0.3); background: rgba(96,212,160,0.04); }
.suggestion.is-ok .suggestion-title { color: var(–good); }
.train-status { margin-top: 8px; border-radius: 2px; padding: 9px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid var(–border); background: rgba(255,255,255,0.02); }
.train-status.ts-ok      { border-color: rgba(96,212,160,0.35); background: rgba(96,212,160,0.04); }
.train-status.ts-delay   { border-color: rgba(240,160,64,0.4);  background: rgba(240,160,64,0.05); }
.train-status.ts-cancel  { border-color: rgba(240,96,96,0.4);   background: rgba(240,96,96,0.05); }
.train-status.ts-loading { opacity: 0.5; }
.ts-left { display: flex; flex-direction: column; gap: 2px; }
.ts-dest  { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(–muted); }
.ts-time  { font-size: 1.05rem; font-weight: 500; letter-spacing: -0.02em; }
.ts-time .ts-sched { color: var(–text); }
.ts-time .ts-exp   { font-size: 0.78rem; margin-left: 6px; }
.ts-time .ts-exp.late { color: var(–warn); }
.ts-time .ts-exp.early { color: var(–good); }
.ts-right { text-align: right; }
.ts-badge { font-size: 0.58rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 7px; border-radius: 2px; white-space: nowrap; }
.ts-badge.on-time  { color: var(–good);   background: rgba(96,212,160,0.12); }
.ts-badge.delayed  { color: var(–warn);   background: rgba(240,160,64,0.12); }
.ts-badge.cancelled{ color: var(–danger); background: rgba(240,96,96,0.12); }
.ts-badge.loading  { color: var(–muted);  background: rgba(255,255,255,0.05); }
.ts-platform { font-size: 0.58rem; color: var(–muted); margin-top: 3px; }
</style>

function getTodayTimetable(){const d=new Date().getDay();return d===0?TT.sunday:d===6?TT.saturday:TT.weekday;}
function pad(n){return String(n).padStart(2,'0');}
function fmt(t){let h=Math.floor(t/60)%24;const m=Math.floor(t%60),ap=h<12?'am':'pm';h=h%12||12;return`${h}:${pad(m)}${ap}`;}

// ─── WEATHER (Open-Meteo, no key needed) ──────────────
async function loadWeather(){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${WX_LAT}&longitude=${WX_LON}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation,rain,showers,snowfall&timezone=Europe%2FLondon`;
    const res=await fetch(url);
    if(!res.ok) throw new Error('wx fetch fail');
    const d=await res.json();
    renderWeather(d.current);
  }catch(e){
    document.getElementById('weatherStrip').innerHTML=`<div class="weather-loading" style="color:var(--muted)">weather unavailable</div>`;
  }
}
function renderWeather(c){
  const el=document.getElementById('weatherStrip');
  if(!c)return;
  const temp=Math.round(c.temperature_2m), feels=Math.round(c.apparent_temperature);
  const wind=Math.round(c.wind_speed_10m);
  const rain=c.rain>0||c.showers>0, snow=c.snowfall>0;
  const wmo=c.weather_code;
  const{icon,desc}=wmoLookup(wmo);
  const tags=[];
  weatherPrepExtra=0;
  if(rain||snow){tags.push(`<span class="weather-tag rain">${snow?'🌨 snow':'☔ rain'}</span>`);weatherPrepExtra+=2;}
  if(temp<=5){tags.push(`<span class="weather-tag cold">🧥 cold</span>`);if(!rain&&!snow)weatherPrepExtra+=1;}
  if(wind>=35){tags.push(`<span class="weather-tag wind">💨 ${wind}km/h</span>`);}
  if(!rain&&!snow&&temp>5){tags.push(`<span class="weather-tag clear">dry</span>`);}
  const prepNote=weatherPrepExtra>0?`<span class="weather-prep">+${weatherPrepExtra} min prep</span>`:'';
  el.innerHTML=`<div class="weather-left"><span class="weather-icon">${icon}</span><span class="weather-temp">${temp}°</span><span class="weather-desc">${desc}${feels!==temp?' · feels '+feels+'°':''}</span></div><div class="weather-right">${tags.join('')}${prepNote}</div>`;
}
function wmoLookup(code){
  if(code<=1)return{icon:'☀️',desc:'clear'};if(code<=3)return{icon:'⛅',desc:'partly cloudy'};
  if(code<=48)return{icon:'🌫️',desc:'fog'};if(code<=57)return{icon:'🌦️',desc:'drizzle'};
  if(code<=67)return{icon:'🌧️',desc:'rain'};if(code<=77)return{icon:'🌨️',desc:'snow'};
  if(code<=82)return{icon:'🌧️',desc:'showers'};if(code<=86)return{icon:'🌨️',desc:'snow showers'};
  if(code>=95)return{icon:'⛈️',desc:'thunderstorm'};return{icon:'🌤️',desc:'overcast'};
}

// ─── LINE STATUS (expandable) ─────────────────────────
let lineBannerExpanded=false;
async function loadLineStatus(){
  try{
    const res=await fetch(tfl('/Line/186/Status'));
    if(!res.ok) throw new Error('line status fail');
    renderLineStatus(await res.json());
  }catch(e){document.getElementById('lineBanner').innerHTML='';}
}
function renderLineStatus(data){
  const el=document.getElementById('lineBanner');
  if(!data||!data.length){el.innerHTML='';return;}
  const statuses=data[0].lineStatuses||[];
  if(!statuses.length){el.innerHTML='';return;}
  const sevOrder={'Good Service':0,'Minor Delays':1,'Reduced Service':1,'Bus Service':1,'Severe Delays':2,'Diverted':2,'Part Closure':3,'Planned Closure':3,'Part Suspended':3,'Suspended':4,'Service Closed':4};
  let worst=statuses[0];
  for(const s of statuses){if((sevOrder[s.statusSeverityDescription]||0)>(sevOrder[worst.statusSeverityDescription]||0))worst=s;}
  const sev=worst.statusSeverityDescription||'Unknown';
  const reason=worst.reason||'';
  if(sev==='Good Service'){el.innerHTML='';return;}
  let bannerCls,icon;
  const sl=sev.toLowerCase();
  if(sl.includes('severe')||sl.includes('suspend')||sl.includes('closed')){bannerCls='lb-bad';icon='🚫';}
  else if(sl.includes('divert')||sl.includes('part')||sl.includes('delay')||sl.includes('reduced')||sl.includes('special')){bannerCls='lb-warn';icon='⚠️';}
  else{bannerCls='lb-info';icon='ℹ️';}
  lineBannerExpanded=false;
  el.innerHTML=`<div class="line-banner ${bannerCls}" onclick="toggleLineBanner()">
    <div class="lb-header"><div class="lb-header-left"><div class="lb-icon">${icon}</div><div class="lb-title">186: ${sev}</div></div><div class="lb-chevron" id="lbChevron">▼</div></div>
    ${reason?`<div class="lb-detail" id="lbDetail">${reason}</div>`:''}
  </div>`;
}
function toggleLineBanner(){
  const detail=document.getElementById('lbDetail');
  const chevron=document.getElementById('lbChevron');
  if(!detail)return;
  lineBannerExpanded=!lineBannerExpanded;
  detail.classList.toggle('expanded',lineBannerExpanded);
  chevron.classList.toggle('open',lineBannerExpanded);
}

// ─── HISTORICAL RELIABILITY ───────────────────────────
const HIST_KEY='bus186_history',HIST_MIN=4,HIST_MAX_DAYS=30;
function loadHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||'{}');}catch{return{};}}
function saveHistory(h){try{localStorage.setItem(HIST_KEY,JSON.stringify(h));}catch{}}
function histKey(slot){return`${new Date().getDay()}_${Math.round(slot)}`;}
function recordBusHistory(entries){
  const h=loadHistory(),now=Date.now(),cutoff=now-HIST_MAX_DAYS*86400000;
  for(const e of entries){
    if(e.tracking==='scheduled'||e.schedSlot===null||e.busDelay===null)continue;
    const k=histKey(e.schedSlot);if(!h[k])h[k]=[];
    if(h[k].find(r=>Math.abs(r.ts-now)<120000))continue;
    h[k].push({delay:e.busDelay,ts:now});
    h[k]=h[k].filter(r=>r.ts>cutoff).slice(-20);
  }
  saveHistory(h);
}
function getHistoryStats(slot){
  if(slot===null)return null;
  const h=loadHistory(),k=histKey(slot);
  const recs=(h[k]||[]).filter(r=>r.ts>Date.now()-HIST_MAX_DAYS*86400000);
  if(recs.length<HIST_MIN)return null;
  const delays=recs.map(r=>r.delay),avg=delays.reduce((a,b)=>a+b,0)/delays.length;
  return{avg:Math.round(avg*10)/10,n:recs.length};
}
function historyLabel(s){
  if(!s)return'';
  if(Math.abs(s.avg)<1)return`reliable (${s.n} trips)`;
  return s.avg>0?`usually +${Math.round(s.avg)} late (${s.n} trips)`:`usually ${Math.round(s.avg)} early (${s.n} trips)`;
}

// ─── TRAINS ───────────────────────────────────────────
function nextTrain(afterMins){
  if(darwinTrains.length){for(const t of darwinTrains){if(!t.std)continue;const[h,m]=t.std.split(':').map(Number);const d=h*60+m;if(d>=afterMins)return d;}return null;}
  if(darwinLoaded)return nextTrainFallback(afterMins);return null;
}
function nextTrainFallback(after){const s=330,e=1430;if(after>e)return null;const f=Math.max(after,s);const sl=Math.ceil(f/20)*20;return sl<=e?sl:null;}

// ─── BUS MERGE ────────────────────────────────────────
function mergeBuses(liveR,hwV,nm){
  const MW=5,LA=90,tt=getTodayTimetable();
  const ttSlots=[];for(const[h,m]of tt){const s=h*60+m;if(s<nm-2)continue;if(s>nm+LA)break;ttSlots.push(s);}
  const live=liveR.filter(b=>nm+b.timeToStation/60>=nm).map(b=>{
    const dep=nm+b.timeToStation/60,hwTTS=hwV[b.vehicleId];
    let tracking,jMins;
    if(hwTTS!=null){const d=(hwTTS-b.timeToStation)/60;if(d>5&&d<60){tracking='full';jMins=Math.round(d);}else{tracking='partial';jMins=FALLBACK_JOURNEY;}}
    else{tracking='partial';jMins=FALLBACK_JOURNEY;}
    let schedSlot=null,busDelay=null,best=Infinity;
    for(const s of ttSlots){const d=dep-s,a=Math.abs(d);if(a<=MW&&a<best){best=a;schedSlot=s;busDelay=Math.round(d);}}
    return{depMins:dep,jMins,tracking,live:true,bus:b,schedSlot,busDelay};
  });
  const claimed=new Set();live.forEach(e=>{if(e.schedSlot!==null)claimed.add(e.schedSlot);});
  const sched=[];
  for(const s of ttSlots){if(claimed.has(s))continue;if(live.some(e=>Math.abs(e.depMins-s)<=3))continue;
    sched.push({depMins:s,jMins:FALLBACK_JOURNEY,tracking:'scheduled',live:false,bus:null,schedSlot:s,busDelay:null});}
  return[...live,...sched].sort((a,b)=>a.depMins-b.depMins);
}

let liveR=[],hwVehicles={},mergedBuses=[],selectedIdx=null;
function toggleScheduled(){showScheduled=!showScheduled;const b=document.getElementById('schedToggle');b.classList.toggle('active',showScheduled);b.textContent=showScheduled?'− sched':'+ sched';renderBuses();}

function calcForEntry(entry){
  const nm=nowMins(),{depMins,jMins,tracking}=entry;
  const shower=document.getElementById('shower').checked,trim=document.getElementById('trim').checked;
  const poop=parseInt(document.getElementById('poopMins').value)||6,walk=parseInt(document.getElementById('walkMins').value)||4;
  const arrHW=depMins+jMins,train=nextTrain(arrHW+BUFFER);
  const showerMins=shower?SHOWER_MINS:0,trimMins=trim?TRIM_MINS:0;
  const prepTotal=showerMins+trimMins+POST_SHW+poop+PACK+weatherPrepExtra;
  const leaveAt=depMins-walk,startPrepBy=leaveAt-prepTotal,slack=Math.floor(startPrepBy-nm);
  return{depMins,jMins,tracking,arrHW,train,showerMins,trimMins,prepTotal,leaveAt,startPrepBy,slack,walk};
}

async function loadBuses(){
  const btn=document.getElementById('refreshBtn');btn.classList.add('loading');
  document.getElementById('busList').innerHTML='<div class="loading-msg" style="grid-column:1/-1"><span class="spinner"></span>fetching live data...</div>';
  const prevDep=selectedIdx!==null&&mergedBuses[selectedIdx]?mergedBuses[selectedIdx].depMins:null;selectedIdx=null;
  try{
    const[resR,resHW,resD]=await Promise.all([fetch(tfl(`/StopPoint/${STOP_R}/Arrivals`)),fetch(tfl(`/StopPoint/${STOP_HW}/Arrivals`)),fetch(DARWIN_URL).catch(()=>null)]);
    if(!resR.ok)throw new Error(`Stop R: HTTP ${resR.status}`);if(!resHW.ok)throw new Error(`H&W: HTTP ${resHW.status}`);
    const[dataR,dataHW]=await Promise.all([resR.json(),resHW.json()]);
    darwinLoaded=true;
    if(resD&&resD.ok){const dd=await resD.json();darwinTrains=dd.trainServices||[];}else{darwinTrains=[];}
    liveR=dataR.filter(a=>String(a.lineId)==='186'||String(a.lineName)==='186').sort((a,b)=>a.timeToStation-b.timeToStation);
    hwVehicles={};dataHW.filter(a=>String(a.lineId)==='186'||String(a.lineName)==='186').forEach(a=>{hwVehicles[a.vehicleId]=a.timeToStation;});
    mergedBuses=mergeBuses(liveR,hwVehicles,nowMins());
    recordBusHistory(mergedBuses);
    if(prevDep!==null){let bi=-1,bd=Infinity;mergedBuses.forEach((e,i)=>{const d=Math.abs(e.depMins-prevDep);if(d<bd&&d<3){bd=d;bi=i;}});if(bi>=0)selectedIdx=bi;}
    renderBuses();renderResult();
  }catch(e){document.getElementById('busList').innerHTML=`<div class="loading-msg" style="grid-column:1/-1;color:var(--danger)">⚠ ${e.message}</div>`;}
  finally{btn.classList.remove('loading');}
}

function renderBuses(){
  const nm=nowMins();mergedBuses=mergeBuses(liveR,hwVehicles,nm);
  const list=document.getElementById('busList');
  if(!mergedBuses.length){list.innerHTML='<div class="loading-msg" style="grid-column:1/-1">no 186 buses right now</div>';return;}
  const walk=parseInt(document.getElementById('walkMins').value)||4;
  const sm={full:{cls:'is-full',label:'full track'},partial:{cls:'is-partial',label:'partial'},scheduled:{cls:'is-sched',label:'scheduled'}};
  const tracked=[],scheduled=[];
  mergedBuses.forEach((e,i)=>{if(e.tracking==='scheduled')scheduled.push({entry:e,origIdx:i});else tracked.push({entry:e,origIdx:i});});
  let html='';
  if(!tracked.length){html+='<div class="loading-msg" style="grid-column:1/-1">no tracked buses — toggle scheduled ↗</div>';}
  else{tracked.forEach(({entry,origIdx})=>{html+=renderBusCard(entry,origIdx,nm,walk,sm);});}
  if(showScheduled&&scheduled.length){
    html+=`<div class="sched-divider"><div class="sched-divider-line"></div><div class="sched-divider-label">scheduled (timetable only)</div><div class="sched-divider-line"></div></div>`;
    scheduled.forEach(({entry,origIdx})=>{html+=renderBusCard(entry,origIdx,nm,walk,sm);});
  }
  list.innerHTML=html;
}

function renderBusCard(entry,idx,nm,walk,sm){
  const{depMins,jMins,tracking,schedSlot,busDelay}=entry;
  const minsAway=Math.round(depMins-nm),canCatch=minsAway>=walk,tight=canCatch&&(minsAway-walk)<3;
  const bCls=!canCatch?'badge-miss':tight?'badge-tight':'badge-good';
  const bLbl=!canCatch?'too soon':tight?'tight':'ok';
  const arrHW=depMins+jMins,train=nextTrain(arrHW+BUFFER);
  const trainLbl=train?`🚆 ${fmt(train)}`:'🚆 —';
  const rideLbl=tracking==='full'?`${jMins} min ride`:`~${jMins} min ride`;
  const{cls:stCls,label:stLbl}=sm[tracking];
  const cardDim=tracking==='scheduled'?'is-sched-card':'';
  const uncatch=!canCatch?'is-uncatchable':'';
  const sel=selectedIdx===idx?'selected':'';
  let delayHtml='';
  if(tracking!=='scheduled'&&schedSlot!==null&&busDelay!==null&&Math.abs(busDelay)>=1){
    delayHtml=busDelay>0?`<div class="bus-delay"><span class="sched-time">${fmt(schedSlot)}</span> <span class="delay-amount">+${busDelay} late</span></div>`:`<div class="bus-delay"><span class="sched-time">${fmt(schedSlot)}</span> <span class="early-amount">${busDelay} early</span></div>`;
  }
  const stats=getHistoryStats(schedSlot);
  const histHtml=stats?`<div class="bus-history">${historyLabel(stats)}</div>`:'';
  return`<div class="bus-item ${sel} ${cardDim} ${uncatch}" onclick="selectBus(${idx})"><div class="bus-status ${stCls}"><span class="live-dot"></span>${stLbl}</div><div class="bus-time">${fmt(depMins)}</div>${delayHtml}<div class="bus-sub">in ${minsAway} min</div><div class="bus-sub">${rideLbl}</div><div class="bus-train">${trainLbl}</div><div class="badge ${bCls}">${bLbl}</div>${histHtml}</div>`;
}

function selectBus(i){selectedIdx=i;renderBuses();renderResult();}

function getTrainStatus(trainMins){
  if(!darwinTrains.length)return null;
  for(const t of darwinTrains){if(!t.std)continue;const[h,m]=t.std.split(':').map(Number);const sM=h*60+m;if(Math.abs(sM-trainMins)>2)continue;
    const etd=(t.etd||'').trim(),cancelled=t.isCancelled||etd.toLowerCase()==='cancelled';
    let delayMins=0,expMins=sM;
    if(!cancelled&&etd!=='On time'&&etd!=='Delayed'&&/^\d{2}:\d{2}$/.test(etd)){const[eh,em]=etd.split(':').map(Number);expMins=eh*60+em;delayMins=expMins-sM;}
    return{found:true,schedMins:sM,expMins,delayMins,cancelled,onTime:!cancelled&&etd==='On time',platform:t.platform||null};}
  return{found:false};
}

function renderResult(){
  const panel=document.getElementById('resultPanel');
  if(selectedIdx===null){panel.className='result-panel';panel.innerHTML='<div class="result-empty">tap a bus to see if you can sleep in</div>';return;}
  const entry=mergedBuses[selectedIdx];if(!entry){selectedIdx=null;renderResult();return;}
  const calc=calcForEntry(entry);const nm=nowMins();
  const{depMins,jMins,tracking,arrHW,train,showerMins,trimMins,prepTotal,leaveAt,startPrepBy,slack,walk}=calc;
  if(!train){panel.className='result-panel';panel.innerHTML=`<div class="result-empty" style="color:var(--muted)">${!darwinLoaded?'loading train times…':'no more trains today'}</div>`;return;}
  const busDepMins=depMins-nm;
  const slackCls=slack<0?'slack-miss':slack<5?'slack-tight':'slack-good';
  const slackLbl=slack<0?`${Math.abs(slack)} min late — get up now!`:slack===0?'get up now':`${slack} min to spare`;
  const prepLines=[];
  if(showerMins)prepLines.push(`shower +${showerMins}`);if(trimMins)prepLines.push(`trim +${trimMins}`);
  prepLines.push(`dressed +${POST_SHW}`,`poop +${parseInt(document.getElementById('poopMins').value)||6}`,`pack +${PACK}`);
  if(weatherPrepExtra>0)prepLines.push(`weather +${weatherPrepExtra}`);
  const rC={full:'var(--good)',partial:'var(--warn)',scheduled:'var(--muted)'};
  const rL={full:'live',partial:'partial',scheduled:'sched'};
  const rideNote=`${tracking==='full'?jMins:'~'+jMins} min <span style="color:${rC[tracking]};font-size:0.65rem">${rL[tracking]}</span>`;

  let busDelayStep='';
  if(entry.schedSlot!==null&&entry.busDelay!==null&&Math.abs(entry.busDelay)>=1){
    const dC=entry.busDelay>0?'var(--warn)':'var(--good)';
    const dL=entry.busDelay>0?`+${entry.busDelay} min late`:`${Math.abs(entry.busDelay)} min early`;
    busDelayStep=`<div class="step"><div class="step-label" style="color:${dC}">↳ sched ${fmt(entry.schedSlot)}, running ${dL}</div><div class="step-val"></div></div>`;
  }
  const stats=getHistoryStats(entry.schedSlot);
  let histStep=stats?`<div class="step"><div class="step-label" style="font-style:italic">📊 ${historyLabel(stats)}</div><div class="step-val"></div></div>`:'';

  let suggestionHtml='';
  if(document.getElementById('shower').checked&&slack<8){
    const sugs=[{label:'10 min quicker shower',saving:10},{label:'5 min quicker shower',saving:5},{label:'skipping shower',saving:SHOWER_MINS}];
    let found=null;for(const s of sugs){if(s.saving>showerMins)continue;const ns=slack+s.saving;if(ns>=0&&!found)found={...s,newSlack:ns};}
    if(found){const isOk=found.newSlack>=5;const nw=fmt(startPrepBy+found.saving);
      suggestionHtml=`<div class="suggestion ${isOk?'is-ok':''}"><div class="suggestion-icon">🚿</div><div class="suggestion-body"><div class="suggestion-title">${found.newSlack>=0?'Try '+found.label:'Still tight'}</div><div class="suggestion-detail">${found.newSlack>=0?`<strong>${found.label}</strong> → wake at <strong>${nw}</strong>, <strong>${found.newSlack} min</strong> spare`:`Even skipping shower you'd be <strong>${Math.abs(found.newSlack)} min short</strong>`}</div></div></div>`;
    }else if(slack<0){suggestionHtml=`<div class="suggestion"><div class="suggestion-icon">⏭️</div><div class="suggestion-body"><div class="suggestion-title">Too late for this bus</div><div class="suggestion-detail">Even skipping the shower won't help — tap the next bus</div></div></div>`;}
  }

  const ts=getTrainStatus(train);let tsHtml='';
  if(ts===null){tsHtml=`<div class="train-status ts-loading"><div class="ts-left"><div class="ts-dest">Euston → Milton Keynes Central</div><div class="ts-time"><span class="ts-sched">${fmt(train)}</span></div></div><div class="ts-right"><div class="ts-badge loading"><span class="spinner"></span> checking</div></div></div>`;}
  else if(!ts.found){tsHtml=`<div class="train-status"><div class="ts-left"><div class="ts-dest">Euston → Milton Keynes Central</div><div class="ts-time"><span class="ts-sched">${fmt(train)}</span></div></div><div class="ts-right"><div class="ts-badge loading">no live data</div></div></div>`;}
  else if(ts.cancelled){tsHtml=`<div class="train-status ts-cancel"><div class="ts-left"><div class="ts-dest">Euston → Milton Keynes Central</div><div class="ts-time"><span class="ts-sched">${fmt(train)}</span></div></div><div class="ts-right"><div class="ts-badge cancelled">cancelled</div></div></div>`;}
  else{const dl=ts.delayMins,tc=dl<=0?'ts-ok':'ts-delay',bc=dl<=0?'on-time':'delayed';
    const bl=ts.onTime?'on time':dl<-1?`${Math.abs(dl)} min early`:dl>0?`+${dl} min`:'on time';
    const eH=dl>1?`<span class="ts-exp late"> exp ${fmt(ts.expMins)}</span>`:dl<-1?`<span class="ts-exp early"> exp ${fmt(ts.expMins)}</span>`:'';
    const pH=ts.platform?`<div class="ts-platform">platform ${ts.platform}</div>`:'';
    tsHtml=`<div class="train-status ${tc}"><div class="ts-left"><div class="ts-dest">Euston → Milton Keynes Central</div><div class="ts-time"><span class="ts-sched">${fmt(train)}</span>${eH}</div></div><div class="ts-right"><div class="ts-badge ${bc}">${bl}</div>${pH}</div></div>`;}

  panel.className='result-panel active';
  panel.innerHTML=`<div class="result-hero"><div><div class="result-lbl">wake up by</div><div class="result-big">${fmt(startPrepBy)}</div></div><div class="verdict ${slackCls}">${slackLbl}</div></div>
    <div class="steps">
      <div class="step"><div class="step-label">⏰ wake up &amp; prep<br><em style="font-size:0.62rem;color:var(--muted)">${prepLines.join(' · ')}</em></div><div class="step-val dim">+${prepTotal} min</div></div>
      <div class="step"><div class="step-label">🚶 leave home</div><div class="step-val hi">${fmt(leaveAt)}</div></div>
      <div class="step"><div class="step-label">🚌 board 186 at stop R</div><div class="step-val">${fmt(depMins)} <span style="color:var(--muted);font-size:0.7rem">(in ${Math.round(busDepMins)} min)</span></div></div>
      ${busDelayStep}${histStep}
      <div class="step"><div class="step-label">📍 arrive H&amp;W</div><div class="step-val">${fmt(arrHW)} <span style="color:var(--muted);font-size:0.7rem">(+${rideNote})</span></div></div>
      <div class="step-divider"></div>
      <div class="step"><div class="step-label">🚆 train departs H&amp;W</div><div class="step-val hi">${fmt(train)}</div></div>
    </div>${tsHtml}${suggestionHtml}`;
}
